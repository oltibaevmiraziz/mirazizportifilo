<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>Neural Laptops | Premium Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #020408;
            color: #e2e8f0;
            font-family: sans-serif;
        }

        .cyber-font {
            font-family: 'Orbitron', sans-serif;
        }

        .mono {
            font-family: 'Share Tech Mono', monospace;
        }

        .blue-glow {
            border: 1px solid #00f7ff;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.15);
        }

        .blue-text {
            color: #00f7ff;
        }

        #cart-sidebar {
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(3, 7, 18, 0.95);
            backdrop-filter: blur(10px);
        }

        #cart-sidebar.open {
            transform: translateX(0);
        }
    </style>
</head>

<body class="p-8">
    <a href="index.html" class="inline-block mb-6 text-zinc-500 hover:text-white transition-colors">← Portfolioga
        qaytish</a>

    <nav class="flex justify-between items-center mb-16">
        <h1 class="cyber-font text-2xl font-bold blue-text">NEURAL LAPTOPS</h1>
        <button onclick="toggleCart()"
            class="bg-zinc-900 px-6 py-2 rounded-full border border-zinc-800 blue-text font-bold">
            🛒 SAVAT (<span id="cart-count">0</span>)
        </button>
    </nav>

    <div id="hero-section" class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center mb-20">
        <div>
            <span class="mono blue-text mb-2 block">NEW ARRIVAL v2.0</span>
            <h2 class="cyber-font text-5xl font-black mb-6 leading-tight">TITAN X-PRO<br>LIMITLESS POWER</h2>
            <p class="text-zinc-400 mb-8 max-w-md">Quantum M3 chipi, 128GB RAM va gologrammali OLED displey bilan
                jihozlangan eng so'nggi noutbuk.</p>
            <button onclick="addToCart('Titan X-Pro', 4500)"
                class="bg-blue-500 hover:bg-blue-400 text-black font-bold py-4 px-10 rounded-sm cyber-font text-sm transition-all shadow-lg shadow-blue-500/20">SAVATGA
                QO'SHISH</button>
        </div>
        <div class="blue-glow h-80 rounded-3xl bg-zinc-900 flex items-center justify-center text-9xl animate-pulse">💻
        </div>
    </div>

    <h3 class="cyber-font text-lg mb-8 border-b border-zinc-800 pb-4">Barcha Modellar</h3>
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Mahsulotlar JS orqali bu yerga yuklanadi (30+ dona) -->
    </div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar"
        class="fixed top-0 right-0 h-full w-full sm:w-96 border-l border-zinc-800 z-50 p-6 shadow-2xl flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="cyber-font text-xl blue-text">SAVATCHA</h2>
            <button onclick="toggleCart()" class="text-zinc-500 hover:text-white text-2xl">✕</button>
        </div>
        <div id="cart-items" class="flex-1 space-y-4 overflow-y-auto pr-2">
            <p class="text-zinc-500 text-center mt-10">Savat hozircha bo'sh...</p>
        </div>
        <div class="border-t border-zinc-800 pt-6 mt-4">
            <div class="flex justify-between mb-6">
                <span class="text-zinc-400">Umumiy summa:</span>
                <span id="cart-total" class="blue-text font-bold text-xl">$0</span>
            </div>
            <button onclick="checkout()"
                class="w-full bg-blue-500 hover:bg-blue-400 text-black font-bold py-4 rounded-xl cyber-font text-sm transition-all shadow-lg shadow-blue-500/20">
                BUYURTMA BERISH (TELEGRAM)
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Slim-Air M1', price: 1200, desc: 'Ultra Thin / 15h Battery' },
            { id: 2, name: 'Dragon Gaming', price: 2500, desc: 'RTX 9090 / RGB Glow' },
            { id: 3, name: 'Neural Pad', price: 1800, desc: 'Foldable / AI Integrated' },
            { id: 4, name: 'Workstation Z', price: 4200, desc: 'Server Grade / Dual CPU' },
            { id: 5, name: 'CyberBook Pro', price: 2100, desc: 'OLED / 64GB RAM' },
            { id: 6, name: 'EcoBook Eco', price: 900, desc: 'Solar Powered / recycled' },
            { id: 7, name: 'Zen Edition', price: 1550, desc: 'Silent Cooling / 4K' },
            { id: 8, name: 'Titan Mini', price: 1300, desc: 'Compact Powerhouse' },
            // 30 taga yetkazish uchun loop ishlatamiz pastda
        ];

        // 30 tagacha ko'paytirish
        for (let i = 9; i <= 32; i++) {
            products.push({
                id: i,
                name: `Neural Model ${String.fromCharCode(64 + (i % 26))}-${i}`,
                price: Math.floor(Math.random() * (4000 - 800) + 800),
                desc: 'Next-gen hardware / Quantum Ready'
            });
        }

        let cart = [];

        function initProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-zinc-900/40 p-5 rounded-xl border border-zinc-800 hover:border-blue-500/50 transition-all hover:-translate-y-1 group">
                    <div class="h-32 bg-zinc-800 rounded-lg mb-4 flex items-center justify-center text-4xl group-hover:scale-110 transition-transform">💻</div>
                    <h4 class="cyber-font text-sm mb-1">${p.name}</h4>
                    <p class="mono text-[10px] text-zinc-500 mb-3">${p.desc}</p>
                    <div class="flex justify-between items-center">
                        <span class="blue-text font-bold">$${p.price.toLocaleString()}</span>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="text-[10px] cyber-font bg-zinc-800 border border-zinc-700 py-1.5 px-3 rounded hover:bg-blue-500 hover:text-black transition-colors">ADD</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');

            if (cart.length === 0) {
                itemsDiv.innerHTML = '<p class="text-zinc-500 text-center mt-10">Savat hozircha bo\'sh...</p>';
                totalSpan.innerText = '$0';
                return;
            }

            itemsDiv.innerHTML = cart.map((item, idx) => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border border-white/5">
                    <div>
                        <div class="text-sm font-bold text-white">${item.name}</div>
                        <div class="text-xs blue-text">$${item.price.toLocaleString()}</div>
                    </div>
                    <button onclick="removeFromCart(${idx})" class="text-red-500 hover:text-red-400">✕</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalSpan.innerText = '$' + total.toLocaleString();
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCartUI();
        }

        function checkout() {
            if (cart.length === 0) return alert("Savat bo'sh!");

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const itemList = cart.map(i => `• ${i.name} ($${i.price})`).join('%0A');

            const botToken = "7156321458:AAF9... (O'ZINGIZNING_TOKENINGIZ)"; // Bu yerga botingiz tokenini qo'ying
            const chatId = "950000129"; // Bu yerga @userinfobot orqali olingan Chat ID ni qo'ying

            const message = `🚀 YANGI BUYURTMA!%0A%0A👤 Mijoz: Miraziz Portfolio orqali%0A📞 Tel: +998 95 000 0129%0A📦 Mahsulotlar:%0A${itemList}%0A%0A💰 Jami: $${total.toLocaleString()}`;

            // Telegram API ga yuborish
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${message}`)
                .then(() => {
                    alert("Buyurtma muvaffaqiyatli yuborildi! Telegramni tekshiring.");
                    cart = [];
                    updateCartUI();
                    toggleCart();
                })
                .catch(() => alert("Telegramga yuborishda xatolik! Tokenni tekshiring."));
        }

        window.onload = initProducts;
    </script>
</body>

</html>
