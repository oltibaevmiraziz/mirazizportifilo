<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Xotira O'yini</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0518;
    font-family: 'Nunito', sans-serif;
    color: #f0f0ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .back-btn {
    align-self: flex-start;
    color: rgba(167,139,250,0.8);
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 10px;
    transition: color 0.2s;
    letter-spacing: 1px;
  }
  .back-btn:hover { color: #a78bfa; }

  h1 {
    font-family: 'Righteous', cursive;
    font-size: 2.5rem;
    color: #a78bfa;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(124,58,237,0.6);
  }

  .stats {
    display: flex;
    gap: 30px;
    margin-bottom: 20px;
    font-weight: 700;
    font-size: 1rem;
    color: rgba(240,240,255,0.6);
  }
  .stats span { color: #a78bfa; font-size: 1.2rem; }

  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 400px;
    width: 100%;
  }

  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    border-radius: 14px;
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back {
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(124,58,237,0.05));
    border: 1px solid rgba(124,58,237,0.35);
    font-size: 1.5rem;
    color: rgba(167,139,250,0.5);
    box-shadow: 0 4px 20px rgba(124,58,237,0.15);
  }

  .card-front {
    background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(167,139,250,0.08));
    border: 1px solid rgba(167,139,250,0.5);
    font-size: 2.2rem;
    transform: rotateY(180deg);
    box-shadow: 0 4px 20px rgba(124,58,237,0.2);
  }

  .card.matched .card-front {
    background: linear-gradient(135deg, rgba(34,197,94,0.25), rgba(34,197,94,0.1));
    border-color: rgba(34,197,94,0.5);
    box-shadow: 0 0 20px rgba(34,197,94,0.3);
    animation: matchPop 0.4s ease;
  }

  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.15); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card.wrong .card-front {
    border-color: rgba(239,68,68,0.6);
    box-shadow: 0 0 20px rgba(239,68,68,0.4);
  }

  #message {
    margin-top: 20px;
    font-family: 'Righteous', cursive;
    font-size: 1.2rem;
    color: rgba(240,240,255,0.5);
    height: 28px;
    letter-spacing: 1px;
    text-align: center;
  }

  .btn-row {
    display: flex;
    gap: 14px;
    margin-top: 20px;
  }

  .play-btn {
    padding: 12px 36px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(124,58,237,0.5);
  }
  .play-btn:hover { transform: scale(1.07); box-shadow: 0 6px 30px rgba(124,58,237,0.7); }

  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,5,24,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-overlay h2 { font-family: 'Righteous', cursive; font-size: 2.5rem; color: #a78bfa; text-align: center; }
  .win-overlay p { color: rgba(240,240,255,0.7); font-size: 1.1rem; text-align: center; }
  .confetti { font-size: 3rem; animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<a class="back-btn" href="index.html">← Bosh sahifa</a>
<h1>🧠 XOTIRA O'YINI</h1>

<div class="stats">
  <div>Urinishlar: <span id="moves">0</span></div>
  <div>Juftlar: <span id="pairs">0</span>/8</div>
  <div>Vaqt: <span id="timer">0</span>s</div>
</div>

<div id="grid"></div>

<div id="message">Kartani bosing va boshlang!</div>

<div class="btn-row">
  <button class="play-btn" onclick="initGame()">YANGILASH ↺</button>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="confetti">🎉</div>
  <h2>TABRIKLAYMIZ!</h2>
  <p id="winMsg"></p>
  <button class="play-btn" onclick="initGame(); document.getElementById('winOverlay').classList.remove('show')">QAYTA O'YNASH ↺</button>
</div>

<script>
const EMOJIS = ['🦊','🐸','🦋','🌸','⚡','🍕','🎸','🚀'];
let cards, flipped, matched, moves, timerInt, seconds, canFlip;

function initGame() {
  clearInterval(timerInt);
  const all = [...EMOJIS, ...EMOJIS].sort(() => Math.random() - 0.5);
  cards = all;
  flipped = [];
  matched = 0;
  moves = 0;
  seconds = 0;
  canFlip = true;
  updateStats();
  document.getElementById('message').textContent = 'Kartani bosing va boshlang!';
  document.getElementById('message').style.color = 'rgba(240,240,255,0.5)';

  timerInt = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = seconds;
  }, 1000);

  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.dataset.emoji = emoji;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">${emoji}</div>
        <div class="card-back">✦</div>
      </div>
    `;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
  });
}

function flipCard(card) {
  if (!canFlip) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    updateStats();
    canFlip = false;

    setTimeout(() => {
      const [a, b] = flipped;
      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched');
        b.classList.add('matched');
        matched++;
        updateStats();
        document.getElementById('message').textContent = '🎯 To\'g\'ri juft!';
        document.getElementById('message').style.color = '#4ade80';

        if (matched === EMOJIS.length) {
          clearInterval(timerInt);
          setTimeout(() => {
            document.getElementById('winMsg').textContent =
              `${moves} ta urinishda ${seconds} sekundda yakladingiz! 🏆`;
            document.getElementById('winOverlay').classList.add('show');
          }, 400);
        }
      } else {
        a.classList.add('wrong');
        b.classList.add('wrong');
        document.getElementById('message').textContent = '❌ Mos emas, qayta urinib ko\'ring';
        document.getElementById('message').style.color = '#f87171';
        setTimeout(() => {
          a.classList.remove('flipped', 'wrong');
          b.classList.remove('flipped', 'wrong');
        }, 700);
      }
      flipped = [];
      canFlip = true;
    }, 700);
  }
}

function updateStats() {
  document.getElementById('moves').textContent = moves;
  document.getElementById('pairs').textContent = matched;
}

initGame();
</script>
</body>
</html>
