<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏄 Surf Bay</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #001a2e;
    font-family: 'Nunito', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    overflow: hidden;
    user-select: none;
  }

  .back-btn {
    align-self: flex-start;
    color: rgba(100,220,255,0.8);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
    margin-bottom: 6px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: #64dcff; }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    color: #fff;
    text-shadow: 0 0 30px rgba(0,200,255,0.5), 3px 3px 0 rgba(0,100,180,0.5);
    z-index: 10;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .hud {
    display: flex;
    gap: 28px;
    margin-bottom: 10px;
    z-index: 10;
    font-weight: 900;
    font-size: 0.9rem;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
  }
  .hud-val {
    font-size: 1.3rem;
    color: #fff;
    display: block;
    text-shadow: 0 0 10px rgba(100,220,255,0.8);
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }

  .canvas-wrap { position: relative; z-index: 1; }

  #surfCanvas {
    display: block;
    border-radius: 16px;
    border: 2px solid rgba(0,180,255,0.3);
    box-shadow: 0 0 50px rgba(0,150,255,0.2), 0 20px 60px rgba(0,0,30,0.6);
  }

  .overlay {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: rgba(0,10,30,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 20;
    backdrop-filter: blur(6px);
  }
  .overlay.hidden { display: none; }

  .ov-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: #fff;
    text-shadow: 0 0 20px rgba(0,200,255,0.7);
    text-align: center;
    padding: 0 20px;
  }
  .ov-sub {
    color: rgba(200,240,255,0.65);
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.8;
    padding: 0 24px;
  }
  .ov-score {
    font-size: 2.2rem;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,210,0,0.6);
  }

  .surf-btn {
    padding: 13px 42px;
    background: linear-gradient(135deg, #0096ff, #00d4ff);
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    color: #fff;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 6px 30px rgba(0,150,255,0.5);
    transition: all 0.3s;
  }
  .surf-btn:hover { transform: scale(1.07); box-shadow: 0 8px 40px rgba(0,180,255,0.7); }

  /* Mobile controls */
  .touch-controls {
    display: none;
    gap: 20px;
    margin-top: 14px;
    z-index: 10;
  }
  .touch-btn {
    width: 70px; height: 70px;
    background: rgba(0,180,255,0.15);
    border: 2px solid rgba(0,180,255,0.4);
    border-radius: 50%;
    color: #fff;
    font-size: 1.8rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .touch-btn:active { background: rgba(0,180,255,0.35); }

  @media (max-width: 540px) {
    .touch-controls { display: flex; }
  }
</style>
</head>
<body>

<a class="back-btn" href="index.html">← Bosh sahifa</a>
<h1>🏄 Surf Bay</h1>

<div class="hud">
  <div class="hud-item">HISOB<span class="hud-val" id="score">0</span></div>
  <div class="hud-item">REKORD<span class="hud-val" id="best">0</span></div>
  <div class="hud-item">TEZLIK<span class="hud-val" id="speed">1x</span></div>
  <div class="hud-item">HAYOT<span class="hud-val" id="lives">❤️❤️❤️</span></div>
</div>

<div class="canvas-wrap">
  <canvas id="surfCanvas"></canvas>

  <div class="overlay" id="overlay">
    <div class="ov-title">🌊 Surf Bay</div>
    <div class="ov-sub">
      Chap / O'ng tugmalar yoki A / D bilan harakatlaning.<br>
      To'lqinlar ustida uchib, toshlardan saqlaning!
    </div>
    <button class="surf-btn" onclick="startGame()">🏄 BOSHLASH</button>
  </div>
</div>

<div class="touch-controls">
  <div class="touch-btn" id="btnLeft">◀</div>
  <div class="touch-btn" id="btnRight">▶</div>
</div>

<script>
// ─── SETUP ────────────────────────────────────────────────
const canvas = document.getElementById('surfCanvas');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth - 32, 460);
const H = Math.min(window.innerHeight - 220, 560);
canvas.width = W; canvas.height = H;

const LANES = 5;
const LANE_W = W / LANES;

// ─── STATE ────────────────────────────────────────────────
let score, best, lives, gameSpeed, gameActive, frameId;
let surfer, obstacles, coins, waveOffset, bgLayers, splashes, comboCount, lastObstacleY;
let keys = {};
let touchLeft = false, touchRight = false;

// ─── INIT ─────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').classList.add('hidden');

  score = 0;
  lives = 3;
  gameSpeed = 2.8;
  comboCount = 0;
  waveOffset = 0;
  lastObstacleY = -200;

  surfer = {
    lane: 2,
    x: W / 2,
    targetX: W / 2,
    y: H - 110,
    w: 36, h: 52,
    tilt: 0,
    invincible: 0,
    trail: []
  };

  obstacles = [];
  coins = [];
  splashes = [];

  // Parallax BG layers
  bgLayers = [
    { y: 0, speed: 0.3, color: '#003366', h: H * 0.18 },
    { y: H * 0.18, speed: 0.6, color: '#004488', h: H * 0.25 },
    { y: H * 0.43, speed: 1.0, color: '#0066aa', h: H * 0.57 }
  ];

  best = parseInt(localStorage.getItem('surfBest') || 0);
  gameActive = true;
  cancelAnimationFrame(frameId);
  loop();
}

// ─── GAME LOOP ────────────────────────────────────────────
function loop() {
  if (!gameActive) return;
  update();
  render();
  frameId = requestAnimationFrame(loop);
}

// ─── UPDATE ──────────────────────────────────────────────
function update() {
  score++;
  gameSpeed = 2.8 + score / 600;
  waveOffset += gameSpeed * 0.7;

  document.getElementById('score').textContent = score;
  document.getElementById('speed').textContent = gameSpeed.toFixed(1) + 'x';
  const hearts = ['', '❤️', '❤️❤️', '❤️❤️❤️'];
  document.getElementById('lives').textContent = hearts[Math.max(0, lives)];

  // Surfer horizontal movement
  if ((keys['ArrowLeft'] || keys['a'] || keys['A'] || touchLeft) && surfer.x > LANE_W / 2 + 5) {
    surfer.x -= 5.5;
    surfer.tilt = -0.35;
  } else if ((keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight) && surfer.x < W - LANE_W / 2 - 5) {
    surfer.x += 5.5;
    surfer.tilt = 0.35;
  } else {
    surfer.tilt *= 0.85;
  }

  // Surfer wave bob
  surfer.y = H - 110 + Math.sin(Date.now() * 0.003) * 5;

  // Trail
  surfer.trail.unshift({ x: surfer.x, y: surfer.y + surfer.h / 2 });
  if (surfer.trail.length > 18) surfer.trail.pop();

  if (surfer.invincible > 0) surfer.invincible--;

  // Spawn obstacles
  if (Math.random() < 0.018 + score * 0.000012) {
    const laneIdx = Math.floor(Math.random() * LANES);
    const types = ['rock', 'shark', 'buoy', 'jellyfish'];
    const type = types[Math.floor(Math.random() * types.length)];
    obstacles.push({
      x: laneIdx * LANE_W + LANE_W / 2,
      y: -40,
      type,
      w: 34, h: 34,
      speed: gameSpeed * (0.9 + Math.random() * 0.4),
      wobble: Math.random() * Math.PI * 2
    });
  }

  // Spawn coins
  if (Math.random() < 0.025) {
    const laneIdx = Math.floor(Math.random() * LANES);
    coins.push({
      x: laneIdx * LANE_W + LANE_W / 2,
      y: -20,
      r: 10,
      collected: false,
      sparkle: Math.random() * Math.PI * 2
    });
  }

  // Move & check obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.y += ob.speed;
    ob.wobble += 0.06;

    if (ob.y > H + 60) { obstacles.splice(i, 1); continue; }

    if (surfer.invincible === 0) {
      const dx = Math.abs(ob.x - surfer.x);
      const dy = Math.abs(ob.y - (surfer.y + 10));
      if (dx < 22 && dy < 22) {
        lives--;
        surfer.invincible = 90;
        comboCount = 0;
        spawnSplash(surfer.x, surfer.y, '#ff4444', 20);
        obstacles.splice(i, 1);
        if (lives <= 0) endGame();
        continue;
      }
    }
  }

  // Move & check coins
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.y += gameSpeed * 1.1;
    c.sparkle += 0.1;
    if (c.y > H + 30) { coins.splice(i, 1); continue; }
    const dx = Math.abs(c.x - surfer.x);
    const dy = Math.abs(c.y - surfer.y);
    if (dx < 22 && dy < 28) {
      comboCount++;
      score += 10 * comboCount;
      spawnSplash(c.x, c.y, '#ffd700', 8);
      coins.splice(i, 1);
    }
  }

  // Update splashes
  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i];
    s.particles = s.particles.filter(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.04;
      return p.life > 0;
    });
    if (s.particles.length === 0) splashes.splice(i, 1);
  }
}

function spawnSplash(x, y, color, count) {
  const particles = [];
  for (let i = 0; i < count; i++) {
    const angle = (Math.random() * Math.PI * 2);
    const spd = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2, life: 1, color });
  }
  splashes.push({ particles });
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.22);
  sky.addColorStop(0, '#001833');
  sky.addColorStop(1, '#003a6b');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.22);

  // Sun
  drawSun();

  // Ocean background
  const ocean = ctx.createLinearGradient(0, H * 0.22, 0, H);
  ocean.addColorStop(0, '#0077c2');
  ocean.addColorStop(0.4, '#0055a0');
  ocean.addColorStop(1, '#003070');
  ctx.fillStyle = ocean;
  ctx.fillRect(0, H * 0.22, W, H);

  // Wave rows
  drawWaves();

  // Lane dividers (subtle)
  ctx.setLineDash([4, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  for (let i = 1; i < LANES; i++) {
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, H * 0.25);
    ctx.lineTo(i * LANE_W, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Coins
  for (const c of coins) drawCoin(c);

  // Obstacles
  for (const ob of obstacles) drawObstacle(ob);

  // Surfer trail
  drawTrail();

  // Surfer
  drawSurfer();

  // Splashes
  for (const s of splashes) {
    for (const p of s.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Score combo popup
  if (comboCount > 1) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, (comboCount - 1) * 0.3);
    ctx.font = `bold ${14 + comboCount * 3}px Nunito`;
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10; ctx.shadowColor = '#ffd700';
    ctx.fillText(`x${comboCount} COMBO!`, W / 2, H / 2 - 40);
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  // Invincible flash
  if (surfer.invincible > 0 && Math.floor(surfer.invincible / 8) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,50,50,0.18)';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawSun() {
  const sx = W * 0.78, sy = H * 0.08;
  // Glow
  const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 55);
  sg.addColorStop(0, 'rgba(255,220,80,0.45)');
  sg.addColorStop(0.4, 'rgba(255,160,30,0.18)');
  sg.addColorStop(1, 'transparent');
  ctx.fillStyle = sg;
  ctx.fillRect(sx - 60, sy - 60, 120, 120);
  // Sun disc
  ctx.fillStyle = '#ffdd44';
  ctx.shadowBlur = 20; ctx.shadowColor = '#ffaa00';
  ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Reflection
  ctx.fillStyle = 'rgba(255,220,80,0.12)';
  ctx.fillRect(sx - 10, H * 0.2, 20, H * 0.8);
}

function drawWaves() {
  const numRows = 8;
  for (let r = 0; r < numRows; r++) {
    const yBase = H * 0.22 + (H * 0.78 / numRows) * r + (waveOffset * (0.3 + r * 0.1)) % (H * 0.78 / numRows);
    const alpha = 0.06 + r * 0.025;
    const ampScale = 0.5 + r * 0.07;

    ctx.beginPath();
    ctx.moveTo(0, yBase);
    for (let x = 0; x <= W; x += 6) {
      const y = yBase + Math.sin((x / W) * Math.PI * 4 + waveOffset * 0.04 + r) * 6 * ampScale
                      + Math.sin((x / W) * Math.PI * 7 - waveOffset * 0.03 + r * 0.5) * 3 * ampScale;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, yBase + 14);
    ctx.lineTo(0, yBase + 14);
    ctx.closePath();
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();

    // White foam crest
    if (r % 2 === 0) {
      ctx.beginPath();
      for (let x = 0; x <= W; x += 6) {
        const y = yBase + Math.sin((x / W) * Math.PI * 4 + waveOffset * 0.04 + r) * 6 * ampScale
                        + Math.sin((x / W) * Math.PI * 7 - waveOffset * 0.03 + r * 0.5) * 3 * ampScale;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(255,255,255,${alpha * 1.8})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
}

function drawTrail() {
  for (let i = 0; i < surfer.trail.length; i++) {
    const t = surfer.trail[i];
    const a = (1 - i / surfer.trail.length) * 0.35;
    ctx.fillStyle = `rgba(150,230,255,${a})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y + i * 2.5, (4 - i * 0.15) * (1 - i / surfer.trail.length), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSurfer() {
  ctx.save();
  ctx.translate(surfer.x, surfer.y + 10);
  ctx.rotate(surfer.tilt);

  // Board
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'rgba(0,180,255,0.5)';
  ctx.fillStyle = '#ff6b35';
  ctx.beginPath();
  ctx.ellipse(0, 14, 22, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Board stripe
  ctx.fillStyle = '#fff';
  ctx.fillRect(-14, 10, 28, 3);

  // Body
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-6, -8, 12, 22);

  // Wetsuit stripe
  ctx.fillStyle = '#0096ff';
  ctx.fillRect(-3, -4, 6, 14);

  // Head
  ctx.fillStyle = '#f0c896';
  ctx.beginPath();
  ctx.arc(0, -14, 8, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#3d2000';
  ctx.beginPath();
  ctx.arc(0, -19, 8, Math.PI, 0);
  ctx.fill();

  // Arms out
  ctx.fillStyle = '#1a1a2e';
  ctx.save(); ctx.rotate(-0.4);
  ctx.fillRect(-20, -6, 14, 5);
  ctx.restore();
  ctx.save(); ctx.rotate(0.4);
  ctx.fillRect(6, -6, 14, 5);
  ctx.restore();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawObstacle(ob) {
  ctx.save();
  ctx.translate(ob.x + Math.sin(ob.wobble) * 3, ob.y);

  ctx.shadowBlur = 10;

  if (ob.type === 'rock') {
    ctx.shadowColor = 'rgba(100,100,150,0.4)';
    ctx.fillStyle = '#556';
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(16, 8);
    ctx.lineTo(8, 14);
    ctx.lineTo(-8, 14);
    ctx.lineTo(-16, 8);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#778';
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(6, -4);
    ctx.lineTo(-6, -4);
    ctx.closePath();
    ctx.fill();
  } else if (ob.type === 'shark') {
    ctx.shadowColor = 'rgba(50,100,200,0.5)';
    // Fin
    ctx.fillStyle = '#336';
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.lineTo(10, 5);
    ctx.lineTo(-10, 5);
    ctx.closePath();
    ctx.fill();
    // Body hint underwater
    ctx.fillStyle = 'rgba(40,60,120,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, 10, 18, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(4, -8, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(4, -8, 1.2, 0, Math.PI * 2); ctx.fill();
  } else if (ob.type === 'buoy') {
    ctx.shadowColor = 'rgba(255,80,80,0.5)';
    ctx.fillStyle = '#cc2200';
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff5533';
    ctx.beginPath(); ctx.arc(-4, -4, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(0, 12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(12, 0); ctx.stroke();
  } else if (ob.type === 'jellyfish') {
    ctx.shadowColor = 'rgba(200,100,255,0.6)';
    const pulse = 0.85 + 0.15 * Math.sin(Date.now() * 0.005 + ob.wobble);
    ctx.fillStyle = `rgba(200,100,255,0.7)`;
    ctx.beginPath();
    ctx.ellipse(0, -4, 14 * pulse, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(230,150,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(0, -4, 8 * pulse, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tentacles
    ctx.strokeStyle = 'rgba(200,100,255,0.5)';
    ctx.lineWidth = 1.5;
    for (let t = -2; t <= 2; t++) {
      ctx.beginPath();
      ctx.moveTo(t * 5, 6);
      ctx.quadraticCurveTo(t * 5 + Math.sin(ob.wobble + t) * 6, 18, t * 4 + Math.sin(ob.wobble * 2) * 4, 26);
      ctx.stroke();
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawCoin(c) {
  ctx.save();
  ctx.translate(c.x, c.y);
  const pulse = 0.9 + 0.1 * Math.sin(c.sparkle);
  ctx.scale(pulse, pulse);
  ctx.shadowBlur = 12; ctx.shadowColor = '#ffd700';
  // Star shape
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const ai = ((i * 4 + 2) * Math.PI / 5) - Math.PI / 2;
    i === 0 ? ctx.moveTo(Math.cos(a) * 10, Math.sin(a) * 10) : ctx.lineTo(Math.cos(a) * 10, Math.sin(a) * 10);
    ctx.lineTo(Math.cos(ai) * 5, Math.sin(ai) * 5);
  }
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function endGame() {
  gameActive = false;
  cancelAnimationFrame(frameId);
  if (score > best) { best = score; localStorage.setItem('surfBest', best); }
  document.getElementById('best').textContent = best;

  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="ov-title">🌊 Surfing tugadi!</div>
    <div class="ov-score">${score} ball</div>
    <div class="ov-sub">Rekord: <strong style="color:#ffd700">${best}</strong> ball<br>To'lqin sizni yutib yubordi!</div>
    <button class="surf-btn" onclick="startGame()">🏄 QAYTA BOSHLASH</button>
  `;
  ov.classList.remove('hidden');
}

// ─── INPUT ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('btnLeft').addEventListener('pointerdown', () => touchLeft = true);
document.getElementById('btnLeft').addEventListener('pointerup', () => touchLeft = false);
document.getElementById('btnRight').addEventListener('pointerdown', () => touchRight = true);
document.getElementById('btnRight').addEventListener('pointerup', () => touchRight = false);

// Swipe
let swipeX = 0;
canvas.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive: true });
canvas.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - swipeX;
  touchLeft = dx < -8;
  touchRight = dx > 8;
}, { passive: true });
canvas.addEventListener('touchend', () => { touchLeft = false; touchRight = false; });

// Initial draw
ctx.fillStyle = '#001833';
ctx.fillRect(0, 0, W, H);
document.getElementById('best').textContent = localStorage.getItem('surfBest') || 0;
</script>
</body>
