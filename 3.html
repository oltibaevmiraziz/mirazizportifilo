<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏓 Top Sindirish</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020e1a;
    font-family: 'Nunito', sans-serif;
    color: #f0f0ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }

  .back-btn {
    align-self: flex-start;
    color: rgba(103,232,249,0.8);
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 10px;
    transition: color 0.2s;
    letter-spacing: 1px;
  }
  .back-btn:hover { color: #67e8f9; }

  h1 {
    font-family: 'Righteous', cursive;
    font-size: 2.5rem;
    color: #67e8f9;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(6,182,212,0.6);
  }

  .stats {
    display: flex;
    gap: 30px;
    margin-bottom: 12px;
    font-weight: 700;
    font-size: 1rem;
    color: rgba(240,240,255,0.6);
  }
  .stats span { color: #67e8f9; font-size: 1.2rem; }

  #gameCanvas {
    border: 2px solid rgba(6,182,212,0.4);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(6,182,212,0.25), inset 0 0 60px rgba(0,0,0,0.5);
    display: block;
    background: #020e1a;
    touch-action: none;
  }

  .overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(2,14,26,0.95);
    border: 1px solid rgba(6,182,212,0.4);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 0 50px rgba(6,182,212,0.3);
    display: none;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
    min-width: 240px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { font-family: 'Righteous', cursive; font-size: 2rem; color: #67e8f9; }
  .overlay p { color: rgba(240,240,255,0.7); font-size: 1rem; }

  .play-btn {
    padding: 14px 40px;
    background: #06b6d4;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(6,182,212,0.5);
  }
  .play-btn:hover { transform: scale(1.07); box-shadow: 0 6px 30px rgba(6,182,212,0.7); }

  .canvas-wrap { position: relative; }

  .controls { margin-top: 12px; color: rgba(240,240,255,0.4); font-size: 0.85rem; letter-spacing: 1px; }

  /* Touch slider */
  .slider-wrap {
    display: none;
    width: 400px;
    max-width: 96vw;
    margin-top: 10px;
    background: rgba(6,182,212,0.1);
    border: 1px solid rgba(6,182,212,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    align-items: center;
    gap: 10px;
    color: rgba(240,240,255,0.5);
    font-size: 0.85rem;
  }
  @media (max-width: 520px) {
    .slider-wrap { display: flex; }
    .controls { display: none; }
  }
  #padSlider { flex: 1; accent-color: #06b6d4; cursor: pointer; }
</style>
</head>
<body>

<a class="back-btn" href="index.html">← Bosh sahifa</a>
<h1>🏓 TOP SINDIRISH</h1>

<div class="stats">
  <div>Hisob: <span id="score">0</span></div>
  <div>Rekord: <span id="best">0</span></div>
  <div>Hayotlar: <span id="lives">3</span></div>
</div>

<div class="canvas-wrap">
  <canvas id="gameCanvas" width="400" height="480"></canvas>
  <div class="overlay show" id="overlay">
    <h2>🏓 TOP SINDIRISH</h2>
    <p>Sichqoncha yoki strelka tugmalar bilan raketani boshqaring. Barcha bloklarni sindiring!</p>
    <button class="play-btn" onclick="startGame()">BOSHLASH ▶</button>
  </div>
</div>

<div class="controls">🖱 Sichqoncha yoki ← → tugmalar — raketa boshqarish</div>

<div class="slider-wrap">
  <span>◀</span>
  <input type="range" id="padSlider" min="0" max="100" value="50">
  <span>▶</span>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const BRICK_ROWS = 5, BRICK_COLS = 8;
const BRICK_W = 44, BRICK_H = 18, BRICK_PAD = 4, BRICK_OFFSET_X = 8, BRICK_OFFSET_Y = 40;

const COLORS = [
  ['#ef4444','#fca5a5'], ['#f97316','#fdba74'], ['#eab308','#fde047'],
  ['#22c55e','#86efac'], ['#06b6d4','#67e8f9']
];

let paddle, ball, bricks, score, best, lives, gameRunning, animId, keys;

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  paddle = {x: W/2 - 45, y: H - 30, w: 90, h: 12, speed: 6};
  ball = {x: W/2, y: H - 55, vx: 3.5, vy: -4, r: 8};
  score = 0;
  lives = 3;
  best = parseInt(localStorage.getItem('breakoutBest') || 0);
  keys = {};
  gameRunning = true;
  buildBricks();
  updateStats();
  cancelAnimationFrame(animId);
  loop();
}

function buildBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_PAD),
        y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        color: COLORS[r][0],
        glow: COLORS[r][1],
        alive: true
      });
    }
  }
}

// Input
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  paddle.x = (e.clientX - rect.left) * scaleX - paddle.w / 2;
  clampPaddle();
});

document.getElementById('padSlider').addEventListener('input', e => {
  paddle.x = (e.target.value / 100) * (W - paddle.w);
  clampPaddle();
});

function clampPaddle() {
  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('lives').textContent = lives;
}

function loop() {
  if (!gameRunning) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  // Keyboard paddle
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { paddle.x -= paddle.speed; clampPaddle(); }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { paddle.x += paddle.speed; clampPaddle(); }

  // Ball move
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  // Paddle bounce
  if (ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + 4 &&
      ball.x >= paddle.x - ball.r && ball.x <= paddle.x + paddle.w + ball.r && ball.vy > 0) {
    const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
    ball.vx = hit * 5.5;
    ball.vy = -Math.abs(ball.vy);
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    const maxSpd = 7;
    if (spd > maxSpd) { ball.vx *= maxSpd/spd; ball.vy *= maxSpd/spd; }
  }

  // Ball lost
  if (ball.y - ball.r > H) {
    lives--;
    updateStats();
    if (lives <= 0) { endGame(false); return; }
    ball.x = W/2; ball.y = H - 55;
    ball.vx = (Math.random() > 0.5 ? 1 : -1) * 3.5;
    ball.vy = -4;
  }

  // Brick collision
  for (const b of bricks) {
    if (!b.alive) continue;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.alive = false;
      score += 10;
      if (score > best) { best = score; localStorage.setItem('breakoutBest', best); }
      updateStats();

      const overlapLeft = ball.x + ball.r - b.x;
      const overlapRight = b.x + b.w - (ball.x - ball.r);
      const overlapTop = ball.y + ball.r - b.y;
      const overlapBottom = b.y + b.h - (ball.y - ball.r);
      const minH = Math.min(overlapLeft, overlapRight);
      const minV = Math.min(overlapTop, overlapBottom);
      if (minH < minV) ball.vx = -ball.vx;
      else ball.vy = -ball.vy;
      break;
    }
  }

  // Win check
  if (bricks.every(b => !b.alive)) { endGame(true); }
}

function draw() {
  ctx.fillStyle = '#020e1a';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(6,182,212,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < W; i += 20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
  for (let j = 0; j < H; j += 20) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(W,j); ctx.stroke(); }

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.shadowBlur = 12; ctx.shadowColor = b.glow;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.roundRect(b.x+1, b.y+1, b.w-2, b.h-2, 5);
    ctx.fill();
    // Shine
    const grd = ctx.createLinearGradient(b.x, b.y, b.x, b.y+b.h);
    grd.addColorStop(0, 'rgba(255,255,255,0.25)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.roundRect(b.x+1, b.y+1, b.w-2, (b.h-2)*0.5, [5,5,0,0]);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Paddle
  const pg = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x+paddle.w, paddle.y);
  pg.addColorStop(0, '#0891b2');
  pg.addColorStop(0.5, '#67e8f9');
  pg.addColorStop(1, '#0891b2');
  ctx.fillStyle = pg;
  ctx.shadowBlur = 20; ctx.shadowColor = '#06b6d4';
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 8);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ball
  ctx.shadowBlur = 25; ctx.shadowColor = '#67e8f9';
  const bg = ctx.createRadialGradient(ball.x-2, ball.y-2, 1, ball.x, ball.y, ball.r);
  bg.addColorStop(0, '#e0f7ff');
  bg.addColorStop(0.5, '#67e8f9');
  bg.addColorStop(1, '#0891b2');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ball trail
  ctx.fillStyle = 'rgba(103,232,249,0.15)';
  ctx.beginPath();
  ctx.arc(ball.x - ball.vx*2, ball.y - ball.vy*2, ball.r*0.7, 0, Math.PI*2);
  ctx.fill();
}

function endGame(won) {
  gameRunning = false;
  cancelAnimationFrame(animId);
  const ov = document.getElementById('overlay');
  ov.innerHTML = won
    ? `<h2>🎉 G'ALABA!</h2><p>Barcha bloklarni sindirdingiz!<br>Hisob: <strong style="color:#67e8f9;font-size:1.4rem">${score}</strong></p>
       <button class="play-btn" onclick="startGame()">QAYTA ↺</button>`
    : `<h2>💥 O'YIN TUGADI!</h2><p>Hisob: <strong style="color:#67e8f9;font-size:1.4rem">${score}</strong><br>Rekord: <strong style="color:#67e8f9">${best}</strong></p>
       <button class="play-btn" onclick="startGame()">QAYTA ↺</button>`;
  ov.classList.add('show');
}

// Draw initial frame
ctx.fillStyle = '#020e1a';
ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
